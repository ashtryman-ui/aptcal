<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>입주 현금 계산기 — 로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script src="members.js"></script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MRF1YETDFT"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-MRF1YETDFT');
  </script> 

  <style>
    :root { --navy:#0d2b55; --blue:#1a56db; --blue-mid:#1c64f2; --blue-pale:#eff6ff; --blue-bdr:#bfdbfe; }
    *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
    html,body { height:100%; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
      background:linear-gradient(145deg,#0d2b55 0%,#1a56db 100%);
      min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
    }
    .login-wrap { width:100%; max-width:400px; }
    .login-logo { text-align:center; margin-bottom:20px; }
    .icon-circle {
      width:72px; height:72px; border-radius:50%;
      background:rgba(255,255,255,.15); border:2px solid rgba(255,255,255,.3);
      display:inline-flex; align-items:center; justify-content:center;
      font-size:28px; color:#fff; margin-bottom:12px;
    }
    .login-logo h1 { color:#fff; font-size:20px; font-weight:700; letter-spacing:-.3px; }
    .login-logo p  { color:rgba(255,255,255,.65); font-size:12px; margin-top:4px; }
    .login-card {
      background:#fff; border-radius:20px; padding:28px 24px 24px;
      box-shadow:0 20px 60px rgba(0,0,0,.35);
    }
    .login-card h2 { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:20px; text-align:center; }
    .form-label { font-size:12px; font-weight:600; color:#475569; margin-bottom:5px; }
    .form-control {
      font-size:14px; padding:10px 14px;
      border:1.5px solid #e2e8f0; border-radius:10px; background:#f8fafc;
    }
    .form-control:focus {
      border-color:var(--blue-mid); box-shadow:0 0 0 3px rgba(28,100,242,.12); background:#fff;
    }
    .input-group-text {
      background:#f8fafc; border:1.5px solid #e2e8f0; border-right:none;
      color:#94a3b8; font-size:14px; border-radius:10px 0 0 10px;
    }
    .input-group .form-control { border-left:none; border-radius:0 10px 10px 0; }
    .input-group .form-control:focus { border-left:none; }
    .btn-login {
      width:100%; padding:12px; font-size:15px; font-weight:700;
      background:var(--navy); color:#fff; border:none; border-radius:10px;
      margin-top:8px; cursor:pointer; transition:background .2s; letter-spacing:-.2px;
    }
    .btn-login:hover { background:#091e3d; }
    .alert-error {
      background:#fef2f2; border:1px solid #fecaca; color:#dc2626;
      border-radius:8px; padding:10px 14px; font-size:13px; margin-top:12px; display:none;
    }
    .admin-notice {
      background:var(--blue-pale); border:1px solid var(--blue-bdr); color:var(--blue-mid);
      border-radius:8px; padding:8px 12px; font-size:12px; margin-bottom:12px; display:none;
    }
    .divider { border-top:1px solid #e2e8f0; margin:20px 0 16px; }
    .footer-note { font-size:11px; color:#94a3b8; text-align:center; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="icon-circle"><i class="fas fa-building-columns"></i></div>
    <h1>입주시 조합원인 내가 가지고 있을 현금은?</h1>
    <p>총회 참석해야 추가분담금에 대해서 알수 있습니다.</p>
  </div>

  <div style="display:flex;gap:8px;margin-bottom:16px;">
    <div style="flex:1;background:rgba(255,255,255,.13);border-radius:12px;padding:12px 8px;text-align:center;">
      <i class="fas fa-calculator" style="color:#bfdbfe;font-size:20px"></i>
      <div style="color:#fff;font-size:11px;font-weight:600;margin-top:6px">현금 계산</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,.13);border-radius:12px;padding:12px 8px;text-align:center;">
      <i class="fas fa-receipt" style="color:#bfdbfe;font-size:20px"></i>
      <div style="color:#fff;font-size:11px;font-weight:600;margin-top:6px">세금 자동</div>
    </div>
    <div style="flex:1;background:rgba(255,255,255,.13);border-radius:12px;padding:12px 8px;text-align:center;">
      <i class="fas fa-share-nodes" style="color:#bfdbfe;font-size:20px"></i>
      <div style="color:#fff;font-size:11px;font-weight:600;margin-top:6px">결과 공유</div>
    </div>
  </div>

  <div class="login-card">
    <h2><i class="fas fa-lock me-2 text-secondary"></i>로그인</h2>
    <div class="admin-notice" id="admin-notice">
      <i class="fas fa-shield-halved me-1"></i>관리자 계정이 확인되었습니다. 비밀번호를 입력하세요.
    </div>
    <form id="login-form" onsubmit="doLogin(event)">
      <div class="mb-3">
        <label class="form-label">이름</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-user"></i></span>
          <input type="text" id="inp-name" class="form-control" placeholder="이름을 입력해주세요" autocomplete="name" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label">핸드폰번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-mobile-screen"></i></span>
          <input type="tel" id="inp-phone" class="form-control" placeholder="01012345678 (숫자만)"
                 oninput="onPhoneInput()" autocomplete="tel" required>
        </div>
      </div>
      <div class="mb-3" id="pw-group" style="display:none">
        <label class="form-label">관리자 비밀번호</label>
        <div class="input-group">
          <span class="input-group-text"><i class="fas fa-key"></i></span>
          <input type="password" id="inp-pw" class="form-control" placeholder="비밀번호 입력" autocomplete="current-password">
        </div>
      </div>
      <div class="alert-error" id="err-msg"></div>
      <button type="submit" class="btn-login">
        <i class="fas fa-right-to-bracket me-2"></i>로그인
      </button>
    </form>
    <div class="divider"></div>
    <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px;font-size:13px;color:#1e40af;text-align:center;">
      <i class="fas fa-circle-info me-1"></i>
      이름 <strong>조합원</strong> · 전화번호 <strong>01000000000</strong><br>
      <span style="color:#64748b;font-size:11px;margin-top:4px;display:block">위 정보로 로그인하면 평형별 계산기를 이용할 수 있습니다</span>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  var s = getSession();
  if (s) location.href = 'dashboard.html';
})();

function onPhoneInput() {
  var p = document.getElementById('inp-phone').value.replace(/\D/g, '');
  var a = (p === ADMIN_PHONE);
  document.getElementById('pw-group').style.display = a ? '' : 'none';
  document.getElementById('admin-notice').style.display = a ? '' : 'none';
}

function showError(msg) {
  var e = document.getElementById('err-msg');
  e.textContent = msg;
  e.style.display = '';
  setTimeout(function () { e.style.display = 'none'; }, 4500);
}

function doLogin(e) {
  e.preventDefault();
  var name  = document.getElementById('inp-name').value.trim();
  var phone = document.getElementById('inp-phone').value.replace(/\D/g, '');
  var pw    = document.getElementById('inp-pw').value;

  if (!name || !phone) {
    showError('이름과 핸드폰번호를 모두 입력하세요.');
    return;
  }

  if (phone === ADMIN_PHONE) {
    if (!pw) { showError('관리자 비밀번호를 입력하세요.'); return; }
    if (pw !== ADMIN_PASSWORD) { showError('비밀번호가 올바르지 않습니다.'); return; }
    var adminUnits = MEMBERS.filter(function(m){ return m.phone === phone; });
    setSession({ name: name, phone: phone, isAdmin: true, units: adminUnits });
    logLogin(name, phone, adminUnits);
    location.href = 'dashboard.html';
    return;
  }

  var units = getMemberUnits(name, phone);
  if (!units.length) {
    showError('조합원 명부에서 일치하는 정보를 찾을 수 없습니다. 이름과 핸드폰번호를 확인해 주세요.');
    return;
  }
  setSession({ name: name, phone: phone, isAdmin: false, units: units });
  logLogin(name, phone, units);
  location.href = 'dashboard.html';
}
</script>
</body>
</html>
